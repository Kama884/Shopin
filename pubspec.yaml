name: shopin
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.9.0

#-------------[Packages]-------------
dependencies:
  flutter:
    sdk: flutter

 
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  #lottie: ^3.4.0
  smooth_page_indicator: ^2.0.1

#------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^5.0.0



flutter:

  
  uses-material-design: true

#-------------[Assets]-------------

  assets:
    - assets/logo/


#-------------[Fonts]-------------

  fonts:
    - family: 'Nunito'
      fonts:
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Italic.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-MediumItalic.ttf
          weight: 500
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 600
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 800
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"

  image: assets/logo/light_mode_logo.png
  image_dark: assets/logo/light_mode_logo.png

  android_12:
    color: "#FFFFFF"
    color_dark: "#000000"

    image: assets/logo/light_mode_logo.png
    image_dark: assets/logo/light_mode_logo.png

  web: false